<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問看護DXシミュレーター Final</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); padding: 20px; margin-bottom: 16px; }
        input[type="range"] { height: 8px; border-radius: 5px; background: #e5e7eb; accent-color: #4f46e5; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-indigo-700 text-white p-4 sticky top-0 z-50 flex justify-around shadow-lg">
        <button onclick="showTab('calc')" class="text-sm font-bold">単価・負担計算</button>
        <button onclick="showTab('dash')" class="text-sm font-bold">分析DB</button>
        <button onclick="showTab('settings')" class="text-sm font-bold">⚙️ 設定</button>
    </nav>

    <div class="p-4 max-w-lg mx-auto">

        <section id="calc" class="tab-content active">
            <h2 class="text-xl font-bold mb-4">💰 月間収支・負担計算</h2>
            <div class="card">
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <select id="calc-type" class="p-3 border rounded-lg bg-gray-50 font-bold text-indigo-700" onchange="renderCalcItems()">
                        <option value="medical">医療保険</option>
                        <option value="care">介護保険</option>
                    </select>
                    <select id="user-ratio" class="p-3 border rounded-lg bg-gray-50 font-bold text-orange-600" onchange="calculate()">
                        <option value="0.1">負担: 1割</option>
                        <option value="0.2">負担: 2割</option>
                        <option value="0.3">負担: 3割</option>
                    </select>
                </div>

                <div class="mb-6 p-3 bg-indigo-50 rounded-lg">
                    <div class="flex justify-between mb-2">
                        <label class="text-xs font-bold text-indigo-700 uppercase">月間訪問回数</label>
                        <span class="font-black text-indigo-700" id="val-visit-count">12回</span>
                    </div>
                    <input type="range" id="slide-visit-count" min="1" max="30" value="12" class="w-full" oninput="calculate()">
                </div>
                
                <div id="calc-items" class="space-y-2 max-h-60 overflow-y-auto pr-1 border-b mb-4"></div>
                
                <div class="space-y-2">
                    <div class="p-4 bg-indigo-900 text-white rounded-xl flex justify-between items-center">
                        <span class="text-xs font-bold">月間報酬総額</span>
                        <span class="text-2xl font-black" id="result-price">¥0</span>
                    </div>
                    <div class="p-4 bg-orange-500 text-white rounded-xl flex justify-between items-center">
                        <span class="text-xs font-bold">利用者自己負担</span>
                        <span class="text-2xl font-black" id="user-cost">¥0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="dash" class="tab-content">
            <h2 class="text-xl font-bold mb-4">📈 経営ダッシュボード</h2>
            <div class="card space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-blue-600 block mb-1">医療平均単価(¥)</label>
                        <input type="number" id="input-med" value="8500" class="w-full border p-2 rounded" oninput="updateDashboard()">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-green-600 block mb-1">介護平均単価(¥)</label>
                        <input type="number" id="input-care" value="9000" class="w-full border p-2 rounded" oninput="updateDashboard()">
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-xs font-bold text-purple-600">医療 : 介護 比率</label>
                        <span class="text-xs font-bold" id="val-ratio">50% : 50%</span>
                    </div>
                    <input type="range" id="slide-ratio" min="0" max="100" step="5" value="50" class="w-full" oninput="updateDashboard()">
                </div>
                <div>
                    <label class="text-xs font-bold text-red-600 block mb-1">月間固定費(¥)</label>
                    <input type="number" id="input-fixed" value="600000" class="w-full border p-2 rounded" oninput="updateDashboard()">
                </div>
            </div>
            <div class="card"><canvas id="bepChart" height="180"></canvas></div>
            <div class="grid grid-cols-2 gap-4 text-center">
                <div class="bg-white p-4 rounded-xl shadow border-b-4 border-red-500"><p class="text-[10px] text-gray-500 font-bold">損益分岐点</p><p class="text-xl font-black" id="bep-count">0回</p></div>
                <div class="bg-white p-4 rounded-xl shadow border-b-4 border-indigo-500"><p class="text-[10px] text-gray-500 font-bold">1日必要訪問数</p><p class="text-xl font-black" id="daily-target">0.0回</p></div>
            </div>
        </section>

        <section id="settings" class="tab-content">
            <h2 class="text-xl font-bold mb-4 font-bold">⚙️ マスタ管理</h2>
            <div class="card bg-gray-100 border-dashed border-2 border-gray-300">
                <h3 class="font-bold mb-3 text-sm underline">加算項目の新規追加</h3>
                <div class="space-y-3">
                    <select id="new-type" class="w-full p-2 border rounded-md"><option value="medical">医療保険</option><option value="care">介護保険</option></select>
                    <input type="text" id="new-name" placeholder="加算名称" class="w-full p-2 border rounded-md">
                    <input type="number" id="new-price" placeholder="単価(円) or 単位" class="w-full p-2 border rounded-md">
                    <select id="new-logic" class="w-full p-2 border rounded-md">
                        <option value="per-visit">1訪問ごとに発生</option>
                        <option value="once-month">月1回のみ発生</option>
                        <option value="after-3">週3回(月12回)以降に発生</option>
                    </select>
                    <button onclick="addItem()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">保存</button>
                </div>
            </div>
            <div id="master-list-container" class="mt-4"></div>
        </section>

    </div>

    <script>
        let masterData = {
            medical: [
                { name: '基本療養費(I)', price: 5550, logic: 'per-visit' },
                { name: '管理療養費(初回)', price: 7670, logic: 'once-month' },
                { name: '24時間対応体制加算', price: 6800, logic: 'once-month' }
            ],
            care: [
                { name: '基本(30-60分)', price: 823, logic: 'per-visit' },
                { name: '緊急時訪問看護加算', price: 600, logic: 'once-month' },
                { name: '初回加算', price: 300, logic: 'once-month' }
            ]
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'dash') updateDashboard();
        }

        function renderCalcItems() {
            const type = document.getElementById('calc-type').value;
            const container = document.getElementById('calc-items');
            container.innerHTML = '';
            masterData[type].forEach((item, idx) => {
                const label = document.createElement('label');
                label.className = 'flex items-center justify-between p-3 bg-white border rounded-lg mb-2 cursor-pointer';
                label.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-sm font-bold">${item.name}</span>
                        <span class="text-[10px] text-gray-400">${item.logic === 'per-visit' ? '訪問毎' : (item.logic === 'after-3' ? '12回目以降' : '月1回')}</span>
                    </div>
                    <input type="checkbox" class="w-5 h-5 item-check" data-idx="${idx}" onchange="calculate()">
                `;
                container.appendChild(label);
            });
            calculate();
        }

        function calculate() {
            const type = document.getElementById('calc-type').value;
            const ratio = parseFloat(document.getElementById('user-ratio').value);
            const visits = parseInt(document.getElementById('slide-visit-count').value);
            document.getElementById('val-visit-count').innerText = `${visits}回`;

            let total = 0;
            const selectedChecks = document.querySelectorAll('.item-check:checked');
            
            selectedChecks.forEach(el => {
                const item = masterData[type][el.dataset.idx];
                if (item.logic === 'per-visit') {
                    total += item.price * visits;
                } else if (item.logic === 'once-month') {
                    total += item.price;
                } else if (item.logic === 'after-3') {
                    // 週3回超過(月12回想定)のロジック
                    if (visits > 12) {
                        total += item.price * (visits - 12);
                    }
                }
            });

            if(type === 'care') total = Math.round(total * 10.7);
            const userTotal = Math.floor(total * ratio);
            
            document.getElementById('result-price').innerText = `¥${total.toLocaleString()}`;
            document.getElementById('user-cost').innerText = `¥${userTotal.toLocaleString()}`;
        }

        // ダッシュボード更新用
        let myChart;
        function updateDashboard() {
            const medP = parseInt(document.getElementById('input-med').value) || 0;
            const careP = parseInt(document.getElementById('input-care').value) || 0;
            const ratio = parseInt(document.getElementById('slide-ratio').value);
            const fixed = parseInt(document.getElementById('input-fixed').value) || 0;
            document.getElementById('val-ratio').innerText = `${ratio}% : ${100-ratio}%`;
            const avgPrice = (medP * (ratio/100)) + (careP * ((100-ratio)/100));
            const bep = avgPrice > 0 ? Math.ceil(fixed / avgPrice) : 0;
            document.getElementById('bep-count').innerText = `${bep}回`;
            document.getElementById('daily-target').innerText = `${(bep/20).toFixed(1)}回`;
            const ctx = document.getElementById('bepChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line', data: { labels: ['0', 'BEP', 'Target'], datasets: [{ label: '収益', data: [0, fixed, fixed*1.5], borderColor: '#4f46e5', fill: true, backgroundColor: 'rgba(79, 70, 229, 0.1)' }, { label: '固定費', data: [fixed, fixed, fixed], borderColor: '#f87171', borderDash: [5,5] }] },
                options: { plugins: { legend: { display: false } }, animation: false }
            });
        }

        function renderMaster() {
            const container = document.getElementById('master-list-container');
            container.innerHTML = '';
            ['medical', 'care'].forEach(type => {
                const title = document.createElement('h4');
                title.className = 'text-xs font-bold text-gray-400 mt-4 mb-2 uppercase';
                title.innerText = type === 'medical' ? '医療保険' : '介護保険';
                container.appendChild(title);
                masterData[type].forEach((item, idx) => {
                    const d = document.createElement('div');
                    d.className = 'flex justify-between items-center bg-white p-3 rounded-lg shadow-sm mb-1 text-xs border-l-4 border-indigo-300';
                    d.innerHTML = `<div><p class="font-bold">${item.name}</p><p class="text-[9px] text-gray-400">${item.logic}</p></div>
                                   <div class="flex items-center gap-4"><span class="font-bold text-indigo-600">${item.price}</span>
                                   <button onclick="deleteItem('${type}', ${idx})" class="text-red-400 text-lg">×</button></div>`;
                    container.appendChild(d);
                });
            });
            renderCalcItems();
        }

        function addItem() {
            const type = document.getElementById('new-type').value;
            const name = document.getElementById('new-name').value;
            const price = parseInt(document.getElementById('new-price').value);
            const logic = document.getElementById('new-logic').value;
            if(!name || isNaN(price)) return;
            masterData[type].push({ name, price, logic });
            renderMaster();
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
        }

        function deleteItem(type, idx) {
            if(confirm('削除しますか？')) {
                masterData[type].splice(idx, 1);
                renderMaster();
            }
        }

        renderCalcItems();
        renderMaster();
    </script>
</body>
</html>
