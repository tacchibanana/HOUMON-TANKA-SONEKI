<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訪問看護費用シミュレーター</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f3f4f6; color: #1a202c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: white; border-radius: 20px; border: 2px solid #e2e8f0; padding: 24px; margin-bottom: 24px; }
        input[type="number"] { border: 2px solid #cbd5e1; border-radius: 12px; padding: 10px; width: 100%; font-size: 1.5rem; font-weight: 900; text-align: center; color: #1e293b; }
        @media print {
            nav, .no-print, button, #settings, #dash { display: none !important; }
            body { background: white !important; padding: 0 !important; }
            .card { border: 2px solid #000 !important; box-shadow: none !important; margin: 0 !important; padding: 15px !important; }
            .max-w-lg { max-width: 100% !important; }
            .print-only { display: block !important; }
            .item-checked { display: flex !important; border-bottom: 1px solid #eee; padding: 10px 0; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="p-0">

    <nav class="bg-[#1e293b] text-white p-4 sticky top-0 z-50 flex justify-around shadow-xl no-print">
        <button onclick="showTab('calc')" class="text-base font-black">💰 費用計算</button>
        <button onclick="showTab('dash')" class="text-base font-black">📈 分析DB</button>
        <button onclick="showTab('settings')" class="text-base font-black">⚙️ 設定</button>
    </nav>

    <div class="p-4 max-w-lg mx-auto">
        <div class="print-only mb-8 border-b-4 border-black pb-4 text-center">
            <h1 class="text-3xl font-black">訪問看護 費用概算お見積書</h1>
            <p class="text-right mt-4 font-bold text-lg">作成日: <span id="print-date"></span></p>
        </div>

        <section id="calc" class="tab-content active">
            <div class="flex justify-between items-center mb-6 no-print">
                <h2 class="text-2xl font-black text-[#1e293b]">費用を計算する</h2>
                <button onclick="window.print()" class="bg-green-700 text-white px-6 py-3 rounded-full font-black shadow-lg hover:bg-green-800 transition-all text-sm">🖨️ 印刷/保存</button>
            </div>
            
            <div class="card shadow-sm">
                <div class="grid grid-cols-2 gap-4 mb-8 no-print">
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-500 mb-1">使う保険</label>
                        <select id="calc-type" class="p-3 border-2 border-indigo-200 rounded-xl font-black text-indigo-900 bg-indigo-50 text-lg" onchange="renderCalcItems()">
                            <option value="medical">医療保険</option>
                            <option value="care">介護保険</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-gray-500 mb-1">自己負担</label>
                        <select id="user-ratio" class="p-3 border-2 border-orange-200 rounded-xl font-black text-orange-900 bg-orange-50 text-lg" onchange="calculate()">
                            <option value="0.1">1割</option>
                            <option value="0.2">2割</option>
                            <option value="0.3">3割</option>
                        </select>
                    </div>
                </div>

                <div class="p-6 bg-slate-50 rounded-2xl mb-6 border-2 border-slate-200 print:bg-white print:border-black">
                    <label class="text-base font-black text-slate-800 mb-3 block text-center">① ひと月の訪問回数</label>
                    <div class="flex items-center gap-6">
                        <button onclick="adjustVal('input-visit-count', -1)" class="no-print w-14 h-14 bg-white border-2 border-slate-300 rounded-full font-black text-3xl shadow-sm">-</button>
                        <input type="number" id="input-visit-count" value="12" min="0" class="flex-1 text-4xl print:text-5xl" oninput="calculate()">
                        <button onclick="adjustVal('input-visit-count', 1)" class="no-print w-14 h-14 bg-white border-2 border-slate-300 rounded-full font-black text-3xl shadow-sm">+</button>
                    </div>
                    <div class="mt-8">
                        <p class="text-xs font-black text-slate-400 mb-4 border-b-2 border-slate-200 pb-1 uppercase tracking-widest">含まれる費用・加算項目</p>
                        <div id="calc-items" class="space-y-4"></div>
                    </div>
                </div>

                <div class="p-6 bg-orange-50 rounded-2xl mb-8 border-2 border-orange-100 print:bg-white print:border-black">
                    <label class="text-base font-black text-orange-900 mb-4 block text-center">② 特別指示（連日訪問など）</label>
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <p class="text-xs font-bold text-orange-600 mb-1">指示期間の回数</p>
                            <input type="number" id="input-special-count" value="8" min="0" class="no-print" oninput="calculate()">
                            <span class="print-only text-3xl font-black" id="print-spec-count"></span>
                        </div>
                        <div>
                            <p class="text-xs font-bold text-orange-600 mb-1">1回の料金(円)</p>
                            <input type="number" id="input-special-price" value="6550" min="0" class="no-print" oninput="calculate()">
                            <span class="print-only text-3xl font-black" id="print-spec-price"></span>
                        </div>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <div class="p-5 bg-slate-800 text-white rounded-2xl flex justify-between items-center print:text-black print:bg-slate-100">
                        <span class="text-sm font-black">合計の費用 (100%)</span>
                        <span class="text-3xl font-black" id="result-price">¥0</span>
                    </div>
                    <div class="p-8 bg-orange-600 text-white rounded-2xl flex flex-col items-center shadow-2xl print:text-black print:bg-white print:border-8 print:border-orange-600">
                        <span class="text-lg font-black mb-1">あなたがお支払いする概算額</span>
                        <span class="text-6xl font-black" id="user-cost">¥0</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="dash" class="tab-content no-print">
            <h2 class="text-2xl font-black mb-6">経営分析 (毎日稼働)</h2>
            <div class="card space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-xs font-bold text-blue-600 mb-1 block">医療単価</label><input type="number" id="input-med" value="8500" oninput="updateDashboard()"></div>
                    <div><label class="text-xs font-bold text-green-600 mb-1 block">介護単価</label><input type="number" id="input-care" value="9000" oninput="updateDashboard()"></div>
                </div>
                <div>
                    <div class="flex justify-between mb-2 text-sm font-bold"><label>医療 : 介護 比率</label><span id="val-ratio">50% : 50%</span></div>
                    <input type="range" id="slide-ratio" min="0" max="100" step="5" value="50" class="w-full h-3 bg-gray-200 rounded-lg appearance-none accent-indigo-600" oninput="updateDashboard()">
                </div>
                <div><label class="text-xs font-bold text-red-600 mb-1 block">月間固定費</label><input type="number" id="input-fixed" value="1200000" oninput="updateDashboard()"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 text-center mb-6">
                <div class="bg-white p-6 rounded-2xl shadow border-b-8 border-red-500"><p class="text-xs font-bold text-gray-400">損益分岐点</p><p class="text-3xl font-black" id="bep-count">0回</p></div>
                <div class="bg-white p-6 rounded-2xl shadow border-b-8 border-indigo-500"><p class="text-xs font-bold text-gray-400">1日目標</p><p class="text-3xl font-black" id="daily-target">0.0回</p></div>
            </div>
            <div class="card"><canvas id="bepChart" height="200"></canvas></div>
        </section>

        <section id="settings" class="tab-content no-print">
            <h2 class="text-2xl font-black mb-6">システム設定</h2>
            
            <div class="card mb-8 border-indigo-500 border-4">
                <h3 class="text-lg font-black mb-4 flex items-center gap-2">📍 地域区分設定 (介護保険)</h3>
                <label class="text-xs font-bold text-gray-500 mb-2 block">1単位あたりの単価 (例: 福岡市 10.84)</label>
                <div class="flex items-center gap-4">
                    <input type="number" id="care-unit-price" value="10.84" step="0.01" class="text-3xl font-black text-indigo-700 bg-indigo-50" oninput="calculate()">
                    <span class="text-xl font-black">円</span>
                </div>
                <p class="text-[10px] text-gray-400 mt-4 leading-relaxed">※この数値は介護保険の費用計算時に「合計単位数」へ乗算されます。医療保険には影響しません。</p>
            </div>

            <h2 class="text-2xl font-black mb-6">マスタ項目追加</h2>
            <div class="card bg-gray-50 border-2 border-dashed">
                <div class="space-y-4">
                    <select id="new-type" class="w-full p-4 border rounded-xl"><option value="medical">医療保険</option><option value="care">介護保険</option></select>
                    <input type="text" id="new-name" placeholder="名称" class="w-full p-4 border rounded-xl">
                    <input type="number" id="new-price" placeholder="単価(単位/円)" class="w-full p-4 border rounded-xl">
                    <select id="new-logic" class="w-full p-4 border rounded-xl font-bold text-indigo-700">
                        <option value="per-visit">毎回計上</option>
                        <option value="once-month">月1回のみ</option>
                        <option value="after-2">2回目以降から</option>
                    </select>
                    <button onclick="addItem()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-black text-xl">マスタに保存</button>
                </div>
            </div>
            <div id="master-list-container" class="mt-8"></div>
        </section>
    </div>

    <script>
        let masterData = {
            medical: [
                { name: '基本療養費', price: 5550, logic: 'per-visit' },
                { name: '管理療養費(初回)', price: 7670, logic: 'once-month' },
                { name: '管理療養費(2回目以降)', price: 3000, logic: 'after-2' },
                { name: '24時間対応体制加算', price: 6800, logic: 'once-month' },
                { name: '早朝・夜間訪問看護加算', price: 2100, logic: 'per-visit' },
                { name: '深夜訪問看護加算', price: 4200, logic: 'per-visit' },
                { name: '長時間訪問看護加算', price: 5200, logic: 'per-visit' },
                { name: '複数名訪問看護加算', price: 4500, logic: 'per-visit' }
            ],
            care: [
                { name: '訪問看護Ⅰ-3', price: 823, logic: 'per-visit' },
                { name: '理学療法士等訪問看護Ⅰ-5', price: 794, logic: 'per-visit' },
                { name: '緊急時訪問看護加算Ⅰ', price: 600, logic: 'once-month' },
                { name: '長時間訪問看護加算(90分超)', price: 300, logic: 'per-visit' },
                { name: '専門管理加算イ・ロ', price: 250, logic: 'once-month' },
                { name: '特別管理加算Ⅰ', price: 500, logic: 'once-month' },
                { name: '特別管理加算Ⅱ', price: 250, logic: 'once-month' },
                { name: 'ターミナルケア加算', price: 2500, logic: 'once-month' },
                { name: 'ターミナルケア加算初回Ⅰ', price: 350, logic: 'once-month' },
                { name: 'ターミナルケア加算初回Ⅱ', price: 300, logic: 'once-month' },
                { name: '退院時共同指導加算', price: 600, logic: 'once-month' }
            ]
        };

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'dash') updateDashboard();
            calculate();
        }

        function adjustVal(id, amount) {
            const el = document.getElementById(id);
            el.value = Math.max(0, parseInt(el.value) + amount);
            calculate();
        }

        function renderCalcItems() {
            const type = document.getElementById('calc-type').value;
            const container = document.getElementById('calc-items');
            container.innerHTML = '';
            masterData[type].forEach((item, idx) => {
                const label = document.createElement('div');
                label.id = `item-row-${idx}`;
                label.className = 'flex items-center justify-between p-4 bg-white border-2 border-slate-100 rounded-2xl shadow-sm cursor-pointer';
                const isChecked = (item.name.includes('基本') || item.name.includes('管理') || item.name.includes('訪問看護Ⅰ')) ? 'checked' : '';
                label.innerHTML = `
                    <div class="flex items-center gap-5">
                        <input type="checkbox" class="w-6 h-6 item-check no-print" data-idx="${idx}" onchange="calculate()" ${isChecked}>
                        <span class="text-base font-black text-slate-700">${item.name}</span>
                    </div>
                    <span class="text-lg font-bold text-slate-400 font-mono">${type === 'care' ? item.price + '単位' : '¥' + item.price.toLocaleString()}</span>
                `;
                label.onclick = (e) => {
                    if(e.target.type !== 'checkbox') {
                        const cb = label.querySelector('input');
                        cb.checked = !cb.checked;
                        calculate();
                    }
                };
                container.appendChild(label);
            });
            calculate();
        }

        function calculate() {
            const type = document.getElementById('calc-type').value;
            const ratio = parseFloat(document.getElementById('user-ratio').value);
            const visits = parseInt(document.getElementById('input-visit-count').value) || 0;
            const specialCount = parseInt(document.getElementById('input-special-count').value) || 0;
            const specialPrice = parseInt(document.getElementById('input-special-price').value) || 0;
            
            // 設定画面の地域区分単価を取得（デフォルト 10.84）
            const careUnitPrice = parseFloat(document.getElementById('care-unit-price').value) || 10.84;

            document.getElementById('print-date').innerText = new Date().toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'});
            document.getElementById('print-spec-count').innerText = specialCount + '回';
            document.getElementById('print-spec-price').innerText = '¥' + specialPrice.toLocaleString();

            let normalTotal = 0;
            document.querySelectorAll('.item-check').forEach((el) => {
                const item = masterData[type][el.dataset.idx];
                const row = document.getElementById(`item-row-${el.dataset.idx}`);
                if(el.checked) {
                    row.classList.add('item-checked', 'border-indigo-500', 'bg-indigo-50');
                    if(item.logic === 'per-visit') normalTotal += item.price * visits;
                    else if(item.logic === 'once-month') normalTotal += item.price;
                    else if(item.logic === 'after-2' && visits >= 2) normalTotal += item.price * (visits - 1);
                } else {
                    row.classList.remove('item-checked', 'border-indigo-500', 'bg-indigo-50');
                }
            });

            // 介護保険の場合のみ地域区分を乗算
            if(type === 'care') {
                normalTotal = Math.round(normalTotal * careUnitPrice);
            }

            let specialTotal = specialCount * specialPrice;
            const grandTotal = normalTotal + specialTotal;
            const userTotal = Math.floor(grandTotal * ratio);

            document.getElementById('result-price').innerText = `¥${grandTotal.toLocaleString()}`;
            document.getElementById('user-cost').innerText = `¥${userTotal.toLocaleString()}`;
        }

        let myChart;
        function updateDashboard() {
            const medP = parseInt(document.getElementById('input-med').value) || 0;
            const careP = parseInt(document.getElementById('input-care').value) || 0;
            const ratio = parseInt(document.getElementById('slide-ratio').value);
            const fixed = parseInt(document.getElementById('input-fixed').value) || 0;
            document.getElementById('val-ratio').innerText = `${ratio}% : ${100-ratio}%`;
            const avgPrice = (medP * (ratio/100)) + (careP * ((100-ratio)/100));
            const bep = avgPrice > 0 ? Math.ceil(fixed / avgPrice) : 0;
            document.getElementById('bep-count').innerText = `${bep.toLocaleString()}回`;
            document.getElementById('daily-target').innerText = `${(bep / 30.4).toFixed(1)}回`;
            const ctx = document.getElementById('bepChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line', data: { labels: ['0', '損益分岐点', '目標'], datasets: [{ label: '収益', data: [0, fixed, fixed*1.5], borderColor: '#4338ca', borderWidth: 6, fill: true, backgroundColor: 'rgba(67, 56, 202, 0.05)' }, { label: '固定費', data: [fixed, fixed, fixed], borderColor: '#ef4444', borderDash: [5,5], borderWidth: 3 }] },
                options: { plugins: { legend: { display: false } }, animation: false, scales: { y: { display: false } } }
            });
        }

        function renderMaster() {
            const container = document.getElementById('master-list-container');
            container.innerHTML = '';
            ['medical', 'care'].forEach(type => {
                const title = document.createElement('h4');
                title.className = 'text-xs font-black text-gray-400 mt-8 mb-4 uppercase tracking-widest';
                title.innerText = type === 'medical' ? '医療保険マスタ' : '介護保険マスタ';
                container.appendChild(title);
                masterData[type].forEach((item, idx) => {
                    const d = document.createElement('div');
                    d.className = 'flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm mb-3 border-l-8 border-indigo-600';
                    d.innerHTML = `<div><p class="font-black text-base">${item.name}</p><p class="text-[10px] text-gray-400">${item.logic}</p></div><div class="flex items-center gap-4"><span class="font-black text-indigo-700 text-lg">${type === 'care' ? item.price + '単位' : '¥' + item.price.toLocaleString()}</span><button onclick="deleteItem('${type}', ${idx})" class="text-red-400 font-black text-2xl px-2">×</button></div>`;
                    container.appendChild(d);
                });
            });
            renderCalcItems();
        }

        function addItem() {
            const type = document.getElementById('new-type').value;
            const name = document.getElementById('new-name').value;
            const price = parseInt(document.getElementById('new-price').value);
            const logic = document.getElementById('new-logic').value;
            if(!name || isNaN(price)) return;
            masterData[type].push({ name, price, logic });
            renderMaster();
            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
        }

        function deleteItem(type, idx) {
            if(confirm('削除しますか？')) { masterData[type].splice(idx, 1); renderMaster(); }
        }

        window.onload = function() {
            renderMaster();
            updateDashboard();
        };
    </script>
</body>
</html>
